<!--
Các cách sử dụng CSS:
    a/ in-line CSS (priority: 1)
        Sử dụng trực tiếp css ngay trên tag
    b/ internal CSS (priority: 2)
        khai báo thuộc tính css trong file html và gán vào các tag.
        
        id (#id)
            -> chỉ NÊN được gọi 1 lần trong 1 file HTML
        
        class (.class)
            -> có thể được tái sử dụng nhiều lần trong 1 file HTML
    c/ external CSS (priority: 3)
        tạo file css rồi ref vào các tag
-->
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Day 23</title>

    <style>
        h1 {
            color: red;
            font-size: 50px;
            font-weight: bold;
        }

        #header {
            color: darkred;
            font-size: 70px;
            font-weight: bold;
        }

        .box {
            color: white;
            width: 680px;
            height: 60px;
            background-color: black;
        }

        .box-2 {
            color: red;
            width: 680px;
            height: 60px;
            background-color: black;
        }
    </style>
</head>
<body>
<div>
    <h1 style="color: darkcyan; font-size: 50px">Hello in-line CSS 1</h1>
    <h1 style="h1.color; h1.font-size; h1.font-weight">Hello in-line CSS 2</h1>
</div>

<div id="header">
    <h1>Hello internal CSS with #id</h1>
</div>

<div>
    <h1 class="box">Hello internal CSS with .class 1</h1>
    <!-- box's properties is overridden by box-2's properties  -->
    <h1 class="box box-2">Hello internal CSS with .class 2</h1>
</div>
</body>
</html>
